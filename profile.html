<!DOCTYPE html>
<html lang="en">
<head>
  <script>(function(){try{var s=JSON.parse(localStorage.getItem('lfj:settings')||'{}');if(s.theme==='light')document.documentElement.setAttribute('data-theme','light');}catch(e){}})();</script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile | Low Fang Jun</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css" />
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#09090e">
  <link rel="apple-touch-icon" href="images/icon-192.png">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            darkBg: '#0a0a0e',
            cardBg: '#17151f',
            borderNeon: '#2a2833',
            neonPurple: '#a78bfa',
            neonBlue: '#6ea8fe',
            neonViolet: '#8b7cf0',
            textGray: '#9793ab',
          },
          fontFamily: {
            cyber: ['-apple-system', 'BlinkMacSystemFont', '"SF Pro Display"', '"Segoe UI"', 'sans-serif'],
            code: ['ui-monospace', '"SF Mono"', 'Menlo', 'Consolas', '"Fira Code"', 'monospace'],
            sans: ['-apple-system', 'BlinkMacSystemFont', '"SF Pro Text"', '"Segoe UI"', 'Roboto', 'sans-serif'],
          }
        }
      }
    }
  </script>
</head>
<body class="auth-check-pending bg-darkBg text-white font-sans grid-bg min-h-screen pb-12">
  <header class="max-w-7xl mx-auto px-4 pt-6">
    <div class="bg-cardBg/80 backdrop-blur-md neon-border-purple rounded-2xl px-6 py-4 flex flex-col md:flex-row items-center justify-between gap-4">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-neonViolet to-neonPurple flex items-center justify-center shadow-lg shadow-neonPurple/20">
          <i class="fa-solid fa-shield-halved text-white text-lg animate-pulse"></i>
        </div>
        <div>
          <span class="font-cyber font-semibold text-lg tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-white to-neonPurple">LOW FANG JUN</span>
          <span class="text-[10px] block text-neonPurple font-code font-bold tracking-widest -mt-1">SYSTEM PROFILE</span>
        </div>
      </div>
      <nav class="flex-1 min-w-0 flex flex-wrap items-center justify-center gap-x-4 gap-y-2 text-sm font-cyber font-semibold tracking-wider text-textGray">
        <a href="index.html" class="hover:text-neonPurple transition-colors flex items-center gap-1.5"><i class="fa-solid fa-house text-xs"></i> Home</a>
        <a href="resume.html" class="hover:text-neonPurple transition-colors flex items-center gap-1.5"><i class="fa-solid fa-scroll text-xs"></i> Resume</a>
        <a href="gallery.html" class="hover:text-neonPurple transition-colors flex items-center gap-1.5"><i class="fa-solid fa-images text-xs"></i> Gallery</a>
        <a href="journal.html" class="hover:text-neonPurple transition-colors flex items-center gap-1.5"><i class="fa-solid fa-book text-xs"></i> Journal</a>
        <a href="expenses.html" class="hover:text-neonPurple transition-colors flex items-center gap-1.5"><i class="fa-solid fa-wallet text-xs"></i> Expenses</a>
        <a href="timeline.html" class="hover:text-neonPurple transition-colors flex items-center gap-1.5"><i class="fa-solid fa-timeline text-xs"></i> Timeline</a>
        <a href="habits.html" class="hover:text-neonPurple transition-colors flex items-center gap-1.5"><i class="fa-solid fa-list-check text-xs"></i> Habits</a>
        <a href="calendar.html" class="hover:text-neonPurple transition-colors flex items-center gap-1.5"><i class="fa-solid fa-calendar-days text-xs"></i> Calendar</a>
        <a href="reports.html" class="hover:text-neonPurple transition-colors flex items-center gap-1.5"><i class="fa-solid fa-chart-pie text-xs"></i> Reports</a>
        <a href="ai.html" class="hover:text-neonPurple transition-colors flex items-center gap-1.5"><i class="fa-solid fa-robot text-xs"></i> AI</a>
        <a href="dashboard.html" class="hover:text-neonPurple transition-colors flex items-center gap-1.5"><i class="fa-solid fa-chart-line text-xs"></i> Dashboard</a>
        <a href="notifications.html" class="hover:text-neonPurple transition-colors flex items-center gap-1.5"><i class="fa-solid fa-bell text-xs"></i> Notifications <span id="notif-badge" class="hidden px-1.5 py-0.5 rounded-full bg-rose-500 text-white text-[9px] font-bold"></span></a>
        <a href="contact.html" class="hover:text-neonPurple transition-colors flex items-center gap-1.5"><i class="fa-solid fa-envelope text-xs"></i> Contact</a>
        <a href="settings.html" class="hover:text-neonPurple transition-colors flex items-center gap-1.5"><i class="fa-solid fa-gear text-xs"></i> Settings</a>
      </nav>
    </div>
  </header>

  <main class="max-w-2xl mx-auto px-4 mt-8 space-y-6">
    <a href="dashboard.html" class="text-xs font-code text-textGray hover:text-neonPurple transition-colors inline-flex items-center gap-1.5">
      <i class="fa-solid fa-arrow-left"></i> Back to Search
    </a>

    <section id="profile-header" class="reveal bg-cardBg/90 backdrop-blur-sm p-6 rounded-2xl neon-border-purple">
      <p class="text-xs font-code text-textGray">Loading&hellip;</p>
    </section>

    <section id="private-notice" class="hidden reveal bg-cardBg/90 backdrop-blur-sm p-6 rounded-2xl neon-border-purple text-center">
      <i class="fa-solid fa-lock text-2xl text-textGray"></i>
      <p class="mt-3 text-sm text-textGray">This profile is private.</p>
    </section>

    <section id="profile-content" class="hidden space-y-6">
      <div class="reveal bg-cardBg/90 backdrop-blur-sm p-6 rounded-2xl neon-border-purple">
        <p class="text-[10px] uppercase tracking-[0.2em] text-textGray font-code mb-4">Public Activity</p>
        <div id="profile-stats" class="grid grid-cols-2 lg:grid-cols-4 gap-4 text-sm"></div>
      </div>

      <div class="reveal bg-cardBg/90 backdrop-blur-sm p-6 rounded-2xl neon-border-purple">
        <p class="text-[10px] uppercase tracking-[0.2em] text-textGray font-code mb-4">Public Photos</p>
        <div id="photo-grid" class="grid grid-cols-3 gap-1"></div>
        <p id="photo-grid-empty" class="hidden text-center text-xs font-code text-textGray py-10">No public photos yet.</p>
      </div>
    </section>
  </main>

  <!-- Photo modal: full image + like/comment, read-only otherwise -->
  <div id="photo-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
    <div id="photo-modal-backdrop" class="absolute inset-0 bg-darkBg/80 backdrop-blur-sm"></div>
    <div class="relative w-full max-w-lg bg-cardBg neon-border-purple rounded-2xl overflow-hidden max-h-[90vh] flex flex-col">
      <button id="photo-modal-close" class="absolute top-3 right-3 z-10 w-8 h-8 rounded-full bg-darkBg/70 text-white hover:text-neonPurple flex items-center justify-center text-xl leading-none">&times;</button>
      <img id="photo-modal-img" src="" alt="" class="w-full max-h-[50vh] object-cover flex-shrink-0">
      <div class="p-4 space-y-3 overflow-y-auto">
        <p id="photo-modal-caption" class="text-sm text-white"></p>
        <div class="flex items-center gap-4 pt-3 border-t border-borderNeon/40">
          <button id="photo-modal-like-btn" class="flex items-center gap-1.5 text-xs font-code text-textGray hover:text-rose-400 transition-colors">
            <i class="fa-regular fa-heart"></i> <span id="photo-modal-like-count">0</span>
          </button>
        </div>
        <div id="photo-modal-comments"></div>
      </div>
    </div>
  </div>

  <script src="scripts.js" defer></script>
  <script type="module" src="auth-guard.js"></script>
  <script type="module" src="profile.js"></script>
</body>
</html>
